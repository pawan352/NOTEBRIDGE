<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register - NOTEBRIDGE</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">

  <style>
    .register-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px 0;
    }

    .register-container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }

    .register-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .register-header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #4f46e5;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .register-header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      display: block;
    }

    .form-control {
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px 15px;
      font-size: 14px;
      transition: all 0.3s;
    }

    .form-control:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 0.2rem rgba(79, 70, 229, 0.15);
    }

    .btn-register {
      background: linear-gradient(45deg, #4f46e5, #9333ea);
      border: none;
      color: white;
      font-weight: 600;
      padding: 12px;
      border-radius: 8px;
      width: 100%;
      margin-top: 15px;
      transition: transform 0.2s;
    }

    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
      color: white;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      position: relative;
    }

    .divider::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: #e0e0e0;
    }

    .divider span {
      background: white;
      padding: 0 10px;
      color: #999;
      font-size: 13px;
      position: relative;
      z-index: 1;
    }

    .social-register {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .social-btn {
      border: 2px solid #e0e0e0;
      background: white;
      color: #333;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .social-btn:hover {
      border-color: #4f46e5;
      color: #4f46e5;
    }

    .register-footer {
      text-align: center;
      margin-top: 20px;
    }

    .register-footer p {
      color: #666;
      font-size: 13px;
    }

    .register-footer a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 600;
    }

    .register-footer a:hover {
      text-decoration: underline;
    }

    .back-home {
      position: absolute;
      top: 20px;
      left: 20px;
    }

    .back-home a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: transform 0.2s;
    }

    .back-home a:hover {
      transform: translateX(-5px);
    }

    .checkbox-group {
      display: flex;
      align-items: flex-start;
      margin-bottom: 20px;
      gap: 8px;
    }

    .form-check-input {
      border: 2px solid #e0e0e0;
      width: 18px;
      height: 18px;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .form-check-input:checked {
      background-color: #4f46e5;
      border-color: #4f46e5;
    }

    .form-check-label {
      color: #666;
      font-size: 13px;
      margin-bottom: 0;
      line-height: 1.4;
    }

    .password-strength {
      margin-top: 5px;
      font-size: 12px;
      font-weight: 600;
    }

    .strength-weak { color: #dc3545; }
    .strength-fair { color: #ffc107; }
    .strength-good { color: #17a2b8; }
    .strength-strong { color: #28a745; }

    .row-2-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    @media (max-width: 480px) {
      .row-2-cols {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="back-home">
    <a href="index.html"><i class="bi bi-arrow-left"></i> Back to Home</a>
  </div>

  <div class="register-wrapper">
    <div class="register-container">
      <div class="register-header">
        <h1><i class="bi bi-book"></i> NOTEBRIDGE</h1>
        <p>Create your account and start learning</p>
      </div>

      <form id="registerForm">
        <div class="row-2-cols">
          <div class="form-group">
            <label for="firstName" class="form-label">First Name</label>
            <input type="text" class="form-control" id="firstName" placeholder="First name" required>
          </div>

          <div class="form-group">
            <label for="lastName" class="form-label">Last Name</label>
            <input type="text" class="form-control" id="lastName" placeholder="Last name" required>
          </div>
        </div>

        <div class="form-group">
          <label for="regEmail" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="regEmail" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="regPassword" class="form-label">Password</label>
          <input type="password" class="form-control" id="regPassword" placeholder="Create a strong password" required>
          <div class="password-strength" id="strengthIndicator"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password" required>
        </div>

        <div class="form-group">
          <label for="university" class="form-label">University</label>
          <select class="form-control" id="university" required>
            <option value="">Select your university</option>
            <option value="mdu">MDU</option>
            <option value="ymca">YMCA</option>
            <option value="kuk">KUK</option>
            <option value="gjust">GJUST</option>
            <option value="ccshau">CCSHAU</option>
          </select>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" class="form-check-input" id="terms" required>
          <label for="terms" class="form-check-label">I agree to the <a href="#" style="color: #4f46e5; text-decoration: none;">Terms and Conditions</a> and <a href="#" style="color: #4f46e5; text-decoration: none;">Privacy Policy</a></label>
        </div>

        <button type="submit" class="btn btn-register">Create Account</button>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>

      <div class="social-register">
        <button type="button" class="social-btn"><i class="bi bi-google"></i> Google</button>
        <button type="button" class="social-btn"><i class="bi bi-github"></i> GitHub</button>
      </div>

      <div class="register-footer">
        <p>Already have an account? <a href="login.html">Login here</a></p>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Password strength indicator
    document.getElementById('regPassword').addEventListener('input', function() {
      const password = this.value;
      const strengthIndicator = document.getElementById('strengthIndicator');
      let strength = '';
      let className = '';

      if (password.length === 0) {
        strengthIndicator.textContent = '';
      } else if (password.length < 6) {
        strength = 'Weak password';
        className = 'strength-weak';
      } else if (password.length < 10) {
        strength = 'Fair password';
        className = 'strength-fair';
      } else if (password.length < 16) {
        strength = 'Good password';
        className = 'strength-good';
      } else {
        strength = 'Strong password';
        className = 'strength-strong';
      }

      strengthIndicator.textContent = strength;
      strengthIndicator.className = 'password-strength ' + className;
    });

    // Form submission
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const university = document.getElementById('university').value;
      const terms = document.getElementById('terms').checked;

      // Validation
      if (!firstName || !lastName || !email || !password || !confirmPassword || !university) {
        alert('Please fill in all fields.');
        return;
      }

      if (password !== confirmPassword) {
        alert('Passwords do not match.');
        return;
      }

      if (!terms) {
        alert('Please agree to the terms and conditions.');
        return;
      }

      alert('Registration successful! Welcome to NOTEBRIDGE.');
      // Redirect to home page
      window.location.href = 'index.html';
    });
  </script>
</body>

</html>
