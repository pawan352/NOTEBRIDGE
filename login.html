<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - NOTEBRIDGE</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">

  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .login-container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      max-width: 450px;
      width: 100%;
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #4f46e5;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .login-header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      display: block;
    }

    .form-control {
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px 15px;
      font-size: 14px;
      transition: all 0.3s;
    }

    .form-control:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 0.2rem rgba(79, 70, 229, 0.15);
    }

    .btn-login {
      background: linear-gradient(45deg, #4f46e5, #9333ea);
      border: none;
      color: white;
      font-weight: 600;
      padding: 12px;
      border-radius: 8px;
      width: 100%;
      margin-top: 10px;
      transition: transform 0.2s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
      color: white;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      position: relative;
    }

    .divider::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: #e0e0e0;
    }

    .divider span {
      background: white;
      padding: 0 10px;
      color: #999;
      font-size: 13px;
      position: relative;
      z-index: 1;
    }

    .social-login {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .social-btn {
      border: 2px solid #e0e0e0;
      background: white;
      color: #333;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .social-btn:hover {
      border-color: #4f46e5;
      color: #4f46e5;
    }

    .forgot-password {
      text-align: right;
      margin-bottom: 20px;
    }

    .forgot-password a {
      color: #4f46e5;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
    }

    .login-footer p {
      color: #666;
      font-size: 13px;
    }

    .login-footer a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 600;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    .back-home {
      position: absolute;
      top: 20px;
      left: 20px;
    }

    .back-home a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: transform 0.2s;
    }

    .back-home a:hover {
      transform: translateX(-5px);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .form-check-input {
      border: 2px solid #e0e0e0;
      width: 18px;
      height: 18px;
    }

    .form-check-input:checked {
      background-color: #4f46e5;
      border-color: #4f46e5;
    }

    .form-check-label {
      margin-left: 8px;
      color: #666;
      font-size: 13px;
      margin-bottom: 0;
    }
  </style>
</head>

<body>
  <div class="back-home">
    <a href="index.html"><i class="bi bi-arrow-left"></i> Back to Home</a>
  </div>

  <div class="login-wrapper">
    <div class="login-container">
      <div class="login-header">
        <h1><i class="bi bi-book"></i> NOTEBRIDGE</h1>
        <p>Welcome back! Please login to your account</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
        </div>

        <div class="forgot-password">
          <a href="#">Forgot Password?</a>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" class="form-check-input" id="remember">
          <label for="remember" class="form-check-label">Remember me</label>
        </div>

        <button type="submit" class="btn btn-login">Login</button>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>

      <div class="social-login">
        <button class="social-btn"><i class="bi bi-google"></i> Google</button>
        <button class="social-btn"><i class="bi bi-github"></i> GitHub</button>
      </div>

      <div class="login-footer">
        <p>Don't have an account? <a href="register.html">Sign up here</a></p>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // Simple validation
      if (email && password) {
        alert('Login successful! Welcome to NOTEBRIDGE.');
        // Redirect to home page
        window.location.href = 'index.html';
      } else {
        alert('Please fill in all fields.');
      }
    });
  </script>
</body>

</html>
